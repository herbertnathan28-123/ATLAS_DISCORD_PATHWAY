services:
  - type: web
    name: atlas-fx-discord-bot
    env: node
    plan: free
    buildCommand: npm install && npx puppeteer browsers install chrome
    startCommand: node index.js
    autoDeploy: true
    disk:
      name: atlas-fx-exports
      mountPath: /opt/render/project/src/exports
      sizeGB: 1
